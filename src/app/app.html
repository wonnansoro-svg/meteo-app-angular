<div class="container py-5">
  <h1 class="text-center text-primary mb-4">🌦️ {{ title() }}</h1>

  @if (weatherData()) {
    <div class="card mx-auto shadow-lg border-0" style="max-width: 400px; border-radius: 20px;">
      <div class="card-body text-center" style="background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); border-radius: 20px;">
        
        <h2 class="card-title text-uppercase fw-bold mt-2">{{ weatherData().name }}</h2>
        
        <img 
          [src]="'https://openweathermap.org/img/wn/' + weatherData().weather[0].icon + '@4x.png'" 
          alt="Icône météo"
          class="bg-info bg-opacity-25 rounded-circle shadow-sm my-3"
          style="width: 130px; height: 130px; object-fit: cover;"
        >
        
        <h3 class="display-4 fw-bold text-dark mb-0">{{ weatherData().main.temp }} °C</h3>
        
        <p class="text-muted text-capitalize fs-5 mt-2">{{ weatherData().weather[0].description }}</p>
        
        <hr class="my-4">
        
        <div class="d-flex justify-content-around">
          <div>
            <p class="mb-1 text-muted small text-uppercase">Humidité</p>
            <p class="fw-bold fs-5 mb-0 text-primary">💧 {{ weatherData().main.humidity }}%</p>
          </div>
          <div>
            <p class="mb-1 text-muted small text-uppercase">Vent</p>
            <p class="fw-bold fs-5 mb-0 text-primary">💨 {{ weatherData().wind.speed }} m/s</p>
          </div>
        </div>

      </div>
    </div>
  } @else {
    <div class="d-flex justify-content-center mt-5">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Chargement...</span>
      </div>
    </div>
  }
</div>

<router-outlet></router-outlet>
